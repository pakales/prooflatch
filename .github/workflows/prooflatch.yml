name: ProofLatch

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: prooflatch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prooflatch:
    name: ProofLatch
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out the evaluated commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Evaluate the repository baseline
        uses: pakales/prooflatch@5c23a2620afe12fc1adfed1adee69fa387bc00aa
        with:
          path: .
          target: Pull request repository baseline
